<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара - Практическое задание</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-container">
        <div class="product-card product-card--featured">
            <div class="product-card__image">
                <img src="image/sony.png" alt="Наушники Sony ">
            </div>
            <div class="product-card__content">
                <h2 class="product-card__title">Наушники Sony</h2>
                <p class="product-card__description">
                    Беспроводные наушники с шумоподавлением
                </p>
                <div class="product-card__info">
                    <span class="product-card__price">24 990 ₽</span>
                    <span class="product-card__rating">★ 4.8 (256 отзывов)</span>
                </div>
                <button class="product-card__btn product-card__btn--primary">В корзину</button>
                <button class="product-card__btn product-card__btn--secondary">Подробнее</button>
            </div>
            <div class="product-card__badge">Хит продаж</div>
        </div>

        <div class="product-card">
            <div class="product-card__image">
                <img src="image/canon.png" alt="Фотокамера Canon EOS R5">
            </div>
            <div class="product-card__content">
                <h2 class="product-card__title">Фотокамера Canon </h2>
                <p class="product-card__description">
                    Зеркальная камера с разрешением 48 Мп, 8K видео
                </p>
                <div class="product-card__info">
                    <span class="product-card__price">359 990 ₽</span>
                    <span class="product-card__rating">★ 4.9 (189 отзывов)</span>
                </div>
                <button class="product-card__btn product-card__btn--primary">В корзину</button>
                <button class="product-card__btn product-card__btn--secondary">Подробнее</button>
            </div>
        </div>
    </div>
</body>
</html>
